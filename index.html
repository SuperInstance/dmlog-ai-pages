<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMLog.ai — Fleet Agent</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #0a1628; color: #e2e8f0; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        header { text-align: center; padding: 3rem 0; border-bottom: 2px solid #1e3a5f; }
        h1 { font-size: 2.5rem; color: #Data management:6366f1; margin-bottom: 0.5rem; }
        .subtitle { color: #94a3b8; font-size: 1.1rem; }
        .fleet-badge { display: inline-block; background: #1e3a5f; padding: 0.3rem 1rem; border-radius: 20px; font-size: 0.8rem; color: #Data management:6366f1; margin-top: 1rem; }
        .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin: 2rem 0; }
        .status-card { background: #0f2744; border: 1px solid #1e4d7b; border-radius: 12px; padding: 1.5rem; }
        .status-card h3 { color: #Data management:6366f1; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .status-card .value { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .status-card .sub { font-size: 0.75rem; color: #64748b; }
        .plato-status { background: #1a2744; border: 1px solid #2d4a6f; border-radius: 8px; padding: 1rem; margin: 2rem 0; text-align: center; }
        .plato-status .label { font-size: 0.75rem; color: #64748b; }
        .plato-status .value { color: #22c55e; font-size: 1.1rem; font-weight: bold; }
        footer { text-align: center; padding: 2rem; color: #64748b; font-size: 0.8rem; border-top: 1px solid #1e3a5f; margin-top: 2rem; }
        a { color: #Data management:6366f1; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ DMLog.ai</h1>
            <p class="subtitle">Fleet Agent — dmlog domain</p>
            <span class="fleet-badge">⚡ SuperInstance Fleet Agent</span>
        </header>
        <div class="status-grid">
            <div class="status-card"><h3>Active Sessions</h3><div class="value">12</div><div class="sub">Fleet-wide</div></div>
            <div class="status-card"><h3>Total Entries</h3><div class="value">847</div><div class="sub">This week</div></div>
            <div class="status-card"><h3>Connections</h3><div class="value">23</div><div class="sub">Agents</div></div>
        </div>
        <div class="plato-status">
            <div class="label">PLATO CONNECTION</div>
            <div class="value">● Connected — 1,447 rooms, 23 agents</div>
        </div>
        <footer>
            <p>DMLog.ai — Part of the SuperInstance Fleet</p>
            <p>PLATO Room: <code>dmlog-ai</code> · Agent: dmlog-agent</p>
        </footer>
    </div>
</body>
</html>
